    <head>

    <body>
        <div id="menu">
            <h1>Cave Dash</h1>
            <h2></h2>

            <ol id="leaderboard"></ol>
        </div>
        <div id="initials">
            <h3>Congratulations!</h3>
            <p>
                You got a score in the top 10 on the leaderboard! Type up to 3

            </div>
            <p>Or, <button id="skipinitials">skip</button> and be anonymous</p>
        </div>
        <span id="score"></span>
        <canvas width="3200" height="1800"></canvas>

            const AudioContext =
                window.AudioContext || window.webkitAudioContext
            const audioCtx = new AudioContext()
        </script>
        <audio src="/audio/jump.wav" id="jumpaudio"></audio>

        <audio src="/audio/die.wav" id="dieaudio"></audio>
        <audio src="/audio/crash.wav" id="crashaudio"></audio>
